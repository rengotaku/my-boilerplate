{% extends "base.html" %}

{% block title %}{{ item.name }} 編集 - myweb{% endblock %}

{% block content %}
<div class="max-w-lg">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Item 編集</h1>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/items/{{ item.id }}" class="bg-white rounded-lg shadow p-6 space-y-4">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
                名前 <span class="text-red-500">*</span>
            </label>
            <input
                type="text"
                id="name"
                name="name"
                value="{{ name if name is defined else item.name }}"
                maxlength="100"
                required
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Item の名前"
            >
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">
                説明
            </label>
            <textarea
                id="description"
                name="description"
                maxlength="500"
                rows="4"
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Item の説明（任意）"
            >{{ description if description is defined else item.description }}</textarea>
        </div>

        <div class="flex items-center justify-between pt-2">
            <a href="/" class="text-gray-500 hover:underline">キャンセル</a>
            <button
                type="submit"
                class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700"
            >
                更新
            </button>
        </div>
    </form>
</div>
{% endblock %}
