version: 2
updates:
  # Python (python-cli)
  - package-ecosystem: "pip"
    directory: "/python-cli"
    schedule:
      interval: "monthly"
    groups:
      python-cli-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Go (go-cli)
  - package-ecosystem: "gomod"
    directory: "/go-cli"
    schedule:
      interval: "monthly"
    groups:
      go-cli-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Go (go-rest-api)
  - package-ecosystem: "gomod"
    directory: "/go-rest-api"
    schedule:
      interval: "monthly"
    groups:
      go-rest-api-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Go (go-graphql-api)
  - package-ecosystem: "gomod"
    directory: "/go-graphql-api"
    schedule:
      interval: "monthly"
    groups:
      go-graphql-api-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Go (go-grpc-api)
  - package-ecosystem: "gomod"
    directory: "/go-grpc-api"
    schedule:
      interval: "monthly"
    groups:
      go-grpc-api-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Go (go-ssr-web)
  - package-ecosystem: "gomod"
    directory: "/go-ssr-web"
    schedule:
      interval: "monthly"
    groups:
      go-ssr-web-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Rust (rust-cli)
  - package-ecosystem: "cargo"
    directory: "/rust-cli"
    schedule:
      interval: "monthly"
    groups:
      rust-cli-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
