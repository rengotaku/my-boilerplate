name: Deploy react-spa-cloudflare to Cloudflare Pages

env:
  PROJECT_NAME: react-spa-cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'react-spa-cloudflare/**'
      - '.github/workflows/react-spa-cloudflare-deploy.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: react-spa-cloudflare

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: react-spa-cloudflare/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ env.PROJECT_NAME }}
          workingDirectory: react-spa-cloudflare
