name: rust-cli CI

on:
  push:
    branches: [main]
    paths:
      - 'rust-cli/**'
      - '.github/workflows/rust-cli.yml'
  pull_request:
    paths:
      - 'rust-cli/**'
      - '.github/workflows/rust-cli.yml'

defaults:
  run:
    working-directory: rust-cli

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust-version: ["stable", "1.85"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust ${{ matrix.rust-version }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust-version }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust-cli/target/
          key: ${{ runner.os }}-cargo-${{ matrix.rust-version }}-${{ hashFiles('rust-cli/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint with clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        working-directory: rust-cli
        run: |
          cargo llvm-cov --lib --lcov --output-path lcov.info
          COVERAGE=$(cargo llvm-cov --lib --json | jq '.data[0].totals.lines.percent')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 80%"
            exit 1
          fi
