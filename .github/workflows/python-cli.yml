name: python-cli CI

on:
  push:
    branches: [main]
    paths:
      - 'python-cli/**'
      - '.github/workflows/python-cli.yml'
  pull_request:
    paths:
      - 'python-cli/**'
      - '.github/workflows/python-cli.yml'

defaults:
  run:
    working-directory: python-cli

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install $(cat .python-version)

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src/

      - name: Test
        run: uv run pytest --cov=src/mycli --cov-report=term-missing
