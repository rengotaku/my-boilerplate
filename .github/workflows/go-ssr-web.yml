name: go-ssr-web CI

on:
  push:
    branches: [main]
    paths:
      - 'go-ssr-web/**'
      - '.github/workflows/go-ssr-web.yml'
      - '.github/workflows/go-ci.yml'
  pull_request:
    paths:
      - 'go-ssr-web/**'
      - '.github/workflows/go-ssr-web.yml'
      - '.github/workflows/go-ci.yml'

jobs:
  ci:
    uses: ./.github/workflows/go-ci.yml
    with:
      working-directory: go-ssr-web
      go-versions: '["1.22", "1.23"]'
      test-paths: "./internal/..."
