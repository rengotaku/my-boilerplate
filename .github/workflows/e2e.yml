name: E2E Integration Tests

on:
  pull_request:
    paths:
      - "react-spa-graphql/**"
      - "go-graphql-api/**"
      - "react-spa/**"
      - "react-spa-cloudflare/**"
      - "go-rest-api/**"
      - "e2e/**"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]
    paths:
      - "react-spa-graphql/**"
      - "go-graphql-api/**"
      - "react-spa/**"
      - "react-spa-cloudflare/**"
      - "go-rest-api/**"
      - "e2e/**"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      # Matches @playwright/test version in e2e/package-lock.json.
      # When bumping Playwright, update this tag and regenerate VRT baselines
      # with `make e2e-update-snapshots` to keep pixels reproducible.
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: |
            go-graphql-api/go.sum
            go-rest-api/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install React SPA GraphQL dependencies
        working-directory: react-spa-graphql
        run: npm ci

      - name: Install React SPA dependencies
        working-directory: react-spa
        run: npm ci

      - name: Install React SPA Cloudflare dependencies
        working-directory: react-spa-cloudflare
        run: npm ci

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Run E2E tests (integration + VRT + a11y)
        working-directory: e2e
        run: npx playwright test

      - name: Upload test artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-test-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7
