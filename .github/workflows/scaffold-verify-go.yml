name: Scaffold Verify Go (Reusable)

on:
  workflow_call:
    inputs:
      template:
        required: true
        type: string
        description: "Go template name (e.g., go-rest-api)"

jobs:
  scaffold-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.11.2

      - name: Scaffold project
        run: |
          bash scripts/scaffold/scaffold.sh \
            template=${{ inputs.template }} \
            dest=/tmp/test-${{ inputs.template }} \
            name=test-${{ inputs.template }} \
            go-module-name=github.com/test/test-${{ inputs.template }}

      - name: Verify scaffolded project
        working-directory: /tmp/test-${{ inputs.template }}
        run: |
          go mod tidy
          make ci
