name: react-spa CI

on:
  push:
    branches: [main]
    paths:
      - 'react-spa/**'
      - '.github/workflows/react-spa.yml'
  pull_request:
    paths:
      - 'react-spa/**'
      - '.github/workflows/react-spa.yml'

defaults:
  run:
    working-directory: react-spa

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: react-spa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
