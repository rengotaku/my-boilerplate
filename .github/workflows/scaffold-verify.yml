name: Scaffold Verify

on:
  push:
    branches: [main]
    paths:
      - 'scripts/scaffold/**'
      - 'go-rest-api/**'
      - 'go-graphql-api/**'
      - 'go-grpc-api/**'
      - 'go-ssr-web/**'
      - 'go-cli/**'
      - 'go-react-spa/**'
      - 'react-spa/**'
      - 'react-spa-graphql/**'
      - 'react-spa-cloudflare/**'
      - 'python-cli/**'
      - 'python-web/**'
      - 'rust-cli/**'
      - '.github/workflows/scaffold-verify.yml'
  pull_request:
    paths:
      - 'scripts/scaffold/**'
      - 'go-rest-api/**'
      - 'go-graphql-api/**'
      - 'go-grpc-api/**'
      - 'go-ssr-web/**'
      - 'go-cli/**'
      - 'go-react-spa/**'
      - 'react-spa/**'
      - 'react-spa-graphql/**'
      - 'react-spa-cloudflare/**'
      - 'python-cli/**'
      - 'python-web/**'
      - 'rust-cli/**'
      - '.github/workflows/scaffold-verify.yml'

jobs:
  scaffold-go:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template:
          - go-rest-api
          - go-graphql-api
          - go-grpc-api
          - go-ssr-web
          - go-cli
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.11.2

      - name: Scaffold project
        run: |
          bash scripts/scaffold/scaffold.sh \
            template=${{ matrix.template }} \
            dest=/tmp/test-${{ matrix.template }} \
            name=test-${{ matrix.template }} \
            go-module-name=github.com/test/test-${{ matrix.template }}

      - name: Verify scaffolded project
        working-directory: /tmp/test-${{ matrix.template }}
        run: |
          go mod tidy
          make ci

  scaffold-go-react-spa:
    # Composite template: scaffold runs `.compose.toml` to merge react-spa
    # base + frontend.overlay/ into frontend/. Verifies the full
    # scaffold -> install -> build -> binary-serves-SPA pipeline.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go-react-spa/go.mod

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: react-spa/.node-version

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.11.2

      - name: Scaffold project
        run: |
          bash scripts/scaffold/scaffold.sh \
            template=go-react-spa \
            dest=/tmp/test-go-react-spa \
            name=test-go-react-spa \
            go-module-name=github.com/test/test-go-react-spa

      - name: Install dependencies (Go modules + npm ci)
        working-directory: /tmp/test-go-react-spa
        run: make install

      - name: Build monolithic binary (frontend bundle embedded into Go)
        working-directory: /tmp/test-go-react-spa
        run: make build

      - name: Verify no dev-host leak in production bundle
        working-directory: /tmp/test-go-react-spa
        run: |
          if grep -R --include='*.js' --include='*.css' --include='*.html' \
               'localhost:8080' internal/static/dist/ 2>/dev/null; then
            echo "ERROR: 'localhost:8080' leaked into scaffolded production bundle"
            exit 1
          fi

      - name: Smoke test — scaffolded binary serves SPA + API
        working-directory: /tmp/test-go-react-spa
        run: |
          set -euo pipefail
          PORT=18091 ./bin/server >/tmp/server.log 2>&1 &
          server_pid=$!
          trap "kill $server_pid 2>/dev/null || true" EXIT

          for _ in $(seq 1 20); do
            if curl -sSf -o /dev/null http://localhost:18091/api/v1/users; then
              break
            fi
            sleep 0.5
          done

          fail=0
          check() {
            local path="$1" expected="$2" label="$3"
            local got
            got=$(curl -sS -o /dev/null -w '%{http_code}' "http://localhost:18091${path}")
            if [ "$got" = "$expected" ]; then
              echo "OK  $label  GET $path -> $got"
            else
              echo "FAIL $label  GET $path -> $got (expected $expected)"
              fail=1
            fi
          }
          check "/"             200 "SPA index"
          check "/api/v1/users" 200 "API"
          check "/users"        200 "SPA fallback"

          if [ "$fail" -ne 0 ]; then
            echo "--- server log ---"
            cat /tmp/server.log || true
            exit 1
          fi

  scaffold-react:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template:
          - react-spa
          - react-spa-graphql
          - react-spa-cloudflare
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scaffold project
        run: |
          bash scripts/scaffold/scaffold.sh \
            template=${{ matrix.template }} \
            dest=/tmp/test-${{ matrix.template }} \
            name=test-${{ matrix.template }}

      - name: Verify scaffolded project
        working-directory: /tmp/test-${{ matrix.template }}
        run: |
          npm install
          make lint format-check test-coverage build

  scaffold-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Scaffold project
        run: |
          bash scripts/scaffold/scaffold.sh \
            template=python-cli \
            dest=/tmp/test-python-cli \
            name=test-python-cli

      - name: Verify scaffolded project
        working-directory: /tmp/test-python-cli
        run: |
          uv sync --all-extras
          make ci

  scaffold-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Scaffold project
        run: |
          bash scripts/scaffold/scaffold.sh \
            template=rust-cli \
            dest=/tmp/test-rust-cli \
            name=test-rust-cli

      - name: Verify scaffolded project
        working-directory: /tmp/test-rust-cli
        run: |
          make ci

  scaffold-python-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scaffold project
        run: |
          bash scripts/scaffold/scaffold.sh \
            template=python-web \
            dest=/tmp/test-python-web \
            name=test-python-web

      - name: Install dependencies
        working-directory: /tmp/test-python-web
        run: |
          uv sync --all-extras
          npm install

      - name: Verify scaffolded project
        working-directory: /tmp/test-python-web
        run: |
          make ci
