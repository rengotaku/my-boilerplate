name: go-graphql-api CI

on:
  push:
    branches: [main]
    paths:
      - 'go-graphql-api/**'
      - '.github/workflows/go-graphql-api.yml'
      - '.github/workflows/go-ci.yml'
  pull_request:
    paths:
      - 'go-graphql-api/**'
      - '.github/workflows/go-graphql-api.yml'
      - '.github/workflows/go-ci.yml'

jobs:
  ci:
    uses: ./.github/workflows/go-ci.yml
    with:
      working-directory: go-graphql-api
      go-versions: '["1.25"]'
      test-paths: "./internal/service/... ./internal/repository/..."
