name: go-grpc-api CI

on:
  push:
    branches: [main]
    paths:
      - 'go-grpc-api/**'
      - '.github/workflows/go-grpc-api.yml'
      - '.github/workflows/go-ci.yml'
  pull_request:
    paths:
      - 'go-grpc-api/**'
      - '.github/workflows/go-grpc-api.yml'
      - '.github/workflows/go-ci.yml'

jobs:
  ci:
    uses: ./.github/workflows/go-ci.yml
    with:
      working-directory: go-grpc-api
      go-versions: '["1.24", "1.25"]'
      test-paths: "./internal/..."
