name: python-web CI

on:
  push:
    branches: [main]
    paths:
      - 'python-web/**'
      - '.github/workflows/python-web.yml'
  pull_request:
    paths:
      - 'python-web/**'
      - '.github/workflows/python-web.yml'

defaults:
  run:
    working-directory: python-web

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install $(cat .python-version)

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: python-web/.node-version

      - name: Install Node.js dependencies
        run: npm install

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src/

      - name: Test
        run: uv run pytest --cov=src/myweb --cov-report=term-missing
