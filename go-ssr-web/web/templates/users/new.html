{{template "base" .}}

{{define "content"}}
<h1 class="text-2xl font-bold mb-4">New User</h1>

{{if .Error}}
<p class="text-red-600 mb-4">{{.Error}}</p>
{{end}}

<form action="/users" method="POST" class="max-w-md">
    <div class="mb-4">
        <label for="name" class="block mb-1 font-medium">Name</label>
        <input type="text" id="name" name="name" value="{{if .User}}{{.User.Name}}{{end}}" required class="w-full p-2 border border-gray-300 rounded">
    </div>
    <div class="mb-4">
        <label for="email" class="block mb-1 font-medium">Email</label>
        <input type="email" id="email" name="email" value="{{if .User}}{{.User.Email}}{{end}}" required class="w-full p-2 border border-gray-300 rounded">
    </div>
    <div class="mb-4">
        <label for="password" class="block mb-1 font-medium">Password</label>
        <input type="password" id="password" name="password" required class="w-full p-2 border border-gray-300 rounded">
    </div>
    <div class="flex items-center gap-2">
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 cursor-pointer">Create</button>
        <a href="/users" class="text-blue-600 hover:underline">Cancel</a>
    </div>
</form>
{{end}}
