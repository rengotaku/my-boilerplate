{{template "base" .}}

{{define "content"}}
<h1 class="text-2xl font-bold mb-4">Edit User</h1>

{{if .Error}}
<p class="text-red-600 mb-4">{{.Error}}</p>
{{end}}

<form action="/users/{{.User.ID}}" method="POST" class="max-w-md">
    <div class="mb-4">
        <label for="name" class="block mb-1 font-medium">Name</label>
        <input type="text" id="name" name="name" value="{{.User.Name}}" required class="w-full p-2 border border-gray-300 rounded">
    </div>
    <div class="mb-4">
        <label for="email" class="block mb-1 font-medium">Email</label>
        <input type="email" id="email" name="email" value="{{.User.Email}}" required class="w-full p-2 border border-gray-300 rounded">
    </div>
    <div class="flex items-center gap-2">
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 cursor-pointer">Update</button>
        <a href="/users/{{.User.ID}}" class="text-blue-600 hover:underline">Cancel</a>
    </div>
</form>
{{end}}
