{{template "base" .}}

{{define "content"}}
<h1 class="text-2xl font-bold mb-4">Profile</h1>

<dl class="grid grid-cols-[auto_1fr] gap-x-4 gap-y-2 mb-4">
    <dt class="font-bold">Name</dt>
    <dd>{{.User.Name}}</dd>
    <dt class="font-bold">Email</dt>
    <dd>{{.User.Email}}</dd>
    <dt class="font-bold">User ID</dt>
    <dd class="font-mono text-sm">{{.User.ID}}</dd>
</dl>

<form action="/logout" method="POST" class="inline">
    <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 cursor-pointer">Log out</button>
</form>
{{end}}
