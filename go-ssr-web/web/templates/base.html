{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Go SSR Web</title>
    <link rel="stylesheet" href="/static/css/output.css">
</head>
<body class="font-sans leading-relaxed text-gray-900 max-w-3xl mx-auto p-4">
    <nav class="mb-8 pb-4 border-b border-gray-300 flex gap-4">
        <a href="/" class="text-blue-600 hover:underline">Home</a>
        <a href="/users" class="text-blue-600 hover:underline">Users</a>
        {{if .UserID}}
        <a href="/profile" class="text-blue-600 hover:underline ml-auto">Profile</a>
        {{else}}
        <a href="/login" class="text-blue-600 hover:underline ml-auto">Login</a>
        {{end}}
    </nav>
    <main>
        {{template "content" .}}
    </main>
</body>
</html>
{{end}}
